<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>RD Interlock — Factory OS</title>
  <link rel="stylesheet" href="tokens.css"/>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: 'Geist', system-ui, sans-serif; }
    #root { height: 100vh; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="screens/icons.jsx"></script>
  <script type="text/babel" src="screens/components.jsx"></script>
  <script type="text/babel" src="screens/dashboard.jsx"></script>
  <script type="text/babel" src="screens/daily-entry.jsx"></script>
  <script type="text/babel" src="screens/stock.jsx"></script>
  <script type="text/babel" src="screens/workers.jsx"></script>
  <script type="text/babel" src="screens/cash-dispatch.jsx"></script>
  <script type="text/babel" src="screens/reports-sheet.jsx"></script>
  <script type="text/babel" src="screens/desktop.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      return (
        <DesignCanvas>
          <DCSection id="overview" title="RD Interlock — Factory OS"
            subtitle="A digital notebook for a brick factory. Mobile-first, touch-friendly, fast.">
            <DCArtboard id="dashboard" label="Dashboard · Mobile" width={360} height={780}>
              <div data-screen-label="Dashboard"><DashboardScreen/></div>
            </DCArtboard>
            <DCArtboard id="entry-v1" label="Daily Entry · Same count" width={360} height={780}>
              <div data-screen-label="Daily Entry V1"><DailyEntryV1/></div>
            </DCArtboard>
            <DCArtboard id="entry-v2" label="Daily Entry · Keypad (dark)" width={360} height={780}>
              <div data-screen-label="Daily Entry V2"><DailyEntryV2/></div>
            </DCArtboard>
            <DCArtboard id="stock" label="Stock Lifecycle" width={360} height={780}>
              <div data-screen-label="Stock"><StockScreen/></div>
            </DCArtboard>
          </DCSection>

          <DCSection id="people-money" title="People & money"
            subtitle="Workers, wages, dispatch and cashbook.">
            <DCArtboard id="workers" label="Workers & Wages" width={360} height={780}>
              <div data-screen-label="Workers"><WorkersScreen/></div>
            </DCArtboard>
            <DCArtboard id="worker-sheet" label="Worker detail · Bottom sheet" width={360} height={780}>
              <div data-screen-label="Worker Sheet"><WorkerSheetScreen/></div>
            </DCArtboard>
            <DCArtboard id="cashbook" label="Cashbook" width={360} height={780}>
              <div data-screen-label="Cashbook"><CashbookScreen/></div>
            </DCArtboard>
            <DCArtboard id="dispatch" label="New Dispatch · Step 2" width={360} height={780}>
              <div data-screen-label="Dispatch"><DispatchScreen/></div>
            </DCArtboard>
            <DCArtboard id="reports" label="Reports & Insights" width={360} height={780}>
              <div data-screen-label="Reports"><ReportsScreen/></div>
            </DCArtboard>
          </DCSection>

          <DCSection id="desktop" title="Desktop · Owner cockpit"
            subtitle="For accountants and owners reviewing the whole operation.">
            <DCArtboard id="desktop-dash" label="Owner Dashboard · 1280×800" width={1280} height={800}>
              <div data-screen-label="Desktop Dashboard"><DesktopDashboard/></div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
